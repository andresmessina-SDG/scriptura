# Push-mirror GitHub -> Codeberg. GitHub is the source of truth; Codeberg is
# kept as a faithful read-only mirror. Each run does a full `git clone --mirror`
# of this repo, then pushes branches and tags (with pruning) so both are
# replicated exactly, including deletions.
#
# It pushes only refs/heads/* and refs/tags/* — NOT `git push --mirror`. A
# mirror clone also copies GitHub's hidden pull-request refs (refs/pull/*),
# which Codeberg refuses ("deny updating a hidden ref"), failing the whole
# push. Explicit refspecs skip those and mirror what a mirror should.
#
# Setup (one-time): create a Codeberg access token with repository write scope
# (Codeberg -> Settings -> Applications), then add it to this repo as the
# Actions secret CODEBERGMIRROR. Until the secret exists, the job skips cleanly.
#
# Plain git only — no third-party action — to keep the mirror path free of
# supply-chain surface.
name: Mirror to Codeberg

on:
  push:
    branches: ['**']
    tags: ['**']
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror to Codeberg
        env:
          TOKEN: ${{ secrets.CODEBERGMIRROR }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "CODEBERG_TOKEN not set — skipping mirror. Add the secret to enable."
            exit 0
          fi
          git clone --mirror "https://github.com/andresmessina-SDG/scriptura.git" repo.git
          cd repo.git
          git push --prune "https://andresmessina:${TOKEN}@codeberg.org/andresmessina/scriptura.git" \
            'refs/heads/*:refs/heads/*' 'refs/tags/*:refs/tags/*'
