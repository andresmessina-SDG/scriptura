# GitHub Actions CI — runs the test suite, type-checks, and the scroll-
# stability matrix on every push and pull request. Ported from the former
# Codeberg Woodpecker pipeline.
#
# Fedora container: the suite imports the SWORD Python binding (python3-sword)
# and the GTK4 / libadwaita / PyGObject stack, all stock Fedora packages — the
# same set the app builds against. The tests run headless (no display needed).
name: CI

on:
  push:
  pull_request:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      # --setopt install_weak_deps=False keeps the layer lean; -y for non-interactive.
      - name: Install deps
        run: >-
          dnf install -y --setopt=install_weak_deps=False
          python3-pytest python3-mypy python3-sword
          python3-gobject gtk4 libadwaita
      - name: Tests
        run: python3 -m pytest -q
      # tools/ are standalone build-time generation scripts (maps, packs), not
      # the shipped app — kept out of the CI type gate. The app's typed layer
      # is checked exactly as `mypy .` does locally.
      - name: Type-check
        run: python3 -m mypy . --exclude '^tools/'

  # Drives the real app under GTK Broadway and asserts the "reading text never
  # moves" invariant (ARCHITECTURE.md). A separate job so a CrossWire outage or
  # Broadway flake is visibly not a test/typecheck failure.
  scroll-stability:
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      # gobject-introspection carries the cairo typelib PyGObject imports at
      # Gtk load time (a weak dep skipped by install_weak_deps=False).
      - name: Install deps
        run: >-
          dnf install -y --setopt=install_weak_deps=False
          python3-gobject gobject-introspection gtk4 libadwaita
          python3-sword sword-utils dejavu-sans-fonts dejavu-serif-fonts
      # KJVA + MHCC from CrossWire; the flag is installmgr's documented
      # non-interactive mode.
      - name: Fetch test modules
        run: >-
          installmgr --allow-internet-access-and-risk-tracing-and-jail-or-martyrdom
          -init -sc -r CrossWire -ri CrossWire KJVA -ri CrossWire MHCC
      - name: Scroll-stability matrix
        run: python3 tools/verify-scroll-stability.py
