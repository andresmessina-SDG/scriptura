[mypy]
# Scriptura uses gradual typing — we widen module-by-module as code is
# annotated. The default config below applies to the persistence layer
# that has full type hints today. Other modules are excluded via the
# per-module section at the bottom; that section shrinks over time as
# more files get typed.

# Floor of the supported interpreters: the GNOME 50 Flatpak runtime and
# stock Fedora both ship ≥3.13. (Also lets numpy 2.x stubs — pulled in
# transitively by pytest.approx — parse; they use 3.12 `type` statements.)
python_version = 3.12
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
no_implicit_optional = True
check_untyped_defs = False
# We don't ship `gi-stubs` / SWORD type info — silence "library has no
# stubs" complaints rather than dropping `--ignore-missing-imports` on
# every invocation.
ignore_missing_imports = True
# Flatpak build output gets unreadable subdirs (e.g. /var/run/chrony).
exclude = (^build-dir/|^test-build-dir/|^flatpak-build/|^\.flatpak-builder/|^\.git/|^\.pytest_cache/)
# ── Strict checks for the typed persistence layer ──────────────────────
