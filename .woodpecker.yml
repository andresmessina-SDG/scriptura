# Woodpecker CI (Codeberg) — runs the test suite and type-checks on every
# push and pull request.
#
# Fedora image: the suite imports the SWORD Python binding (python3-sword) and
# the GTK4 / libadwaita / PyGObject stack, all stock Fedora packages — the same
# set the app builds against. The tests run headless (no display needed).
when:
  - event: [push, pull_request]

steps:
  - name: test-and-typecheck
    image: fedora:latest
    commands:
      # --setopt install_weak_deps=False keeps the layer lean; -y for non-interactive.
      - >-
        dnf install -y --setopt=install_weak_deps=False
        python3-pytest python3-mypy python3-sword
        python3-gobject gtk4 libadwaita
      - python3 -m pytest -q
      # tools/ are standalone build-time generation scripts (maps, packs), not
      # the shipped app — kept out of the CI type gate. The app's typed layer
      # is checked exactly as `mypy .` does locally.
      - python3 -m mypy . --exclude '^tools/'
