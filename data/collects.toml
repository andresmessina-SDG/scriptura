# Bundled collects and troparia for the Today page epigraph — keyed by
# church_year designation sub-keys. Curated word-for-word from
# public-domain / freely reproducible editions; each tradition names
# its edition. DO NOT edit prayer text by hand — regenerate from the
# source (tools provenance: scratchpad build_pack.py, CofE site).
# Anglican section extracted 2026-07-19 from
# https://www.churchofengland.org/prayer-and-worship/worship-texts-and-resources/book-common-prayer/collects-epistles-and-gospels-0
# (the Church of England's online 1662 Book of Common Prayer).
# Roman section extracted 2026-07-19 from The Roman Missal for the Use of the
# Laity (Philadelphia: Eugene Cummiskey, 1861), collated word-for-word against
# a second public-domain witness (Rt Rev Dr England, 1843) to catch OCR
# corruption, which is random per scan. Coverage is PARTIAL and deliberately
# so: a key is emitted only when both witnesses attest it, no other key holds
# the same collect, and the merged text passes a lexical sweep. An unfilled
# key leaves the silence readers already have; a wrongly filled one would put
# the right prayer on the wrong day. Tools: ~/scriptura-roman-collation/.
# Orthodox section extracted 2026-07-19 from Hapgood's Service Book (1906),
# archive.org/details/ServiceBookOfHolyOrthodoxChurchByHapgood, Appendix A
# "The Eight Tones" (scratchpad build_orthodox.py). Sundays after Pentecost
# are keyed by Octoechos tone, not by Sunday — see the [orthodox.aliases]
# note. One OCR correction is recorded in that script; the feast Tropária
# are not yet extracted.

[anglican]
kind = "The Collect"
source = "The Book of Common Prayer, 1662"

[anglican.aliases]
"christmastide" = "feast:12-25"
"christmas2" = "feast:1-1"
"epiphany_week" = "feast:1-6"
"next_before_advent" = "trinity25"
"trinity26" = "epiphany6"
"maundy_thursday" = "palm_sunday"

[anglican.texts]
"advent1" = """Almighty God, give us grace that we may cast away the works of darkness, and put upon us the armour of light, now in the time of this mortal life, in which thy Son Jesus Christ came to visit us in great humility; that in the last day, when he shall come again in his glorious Majesty, to judge both the quick and the dead, we may rise to the life immortal; through him who liveth and reigneth with thee and the Holy Ghost, now and ever. Amen."""
"advent2" = """Blessed Lord, who hast caused all holy Scriptures to be written for our learning: Grant that we may in such wise hear them, read, mark, learn, and inwardly digest them, that by patience and comfort of thy holy Word, we may embrace and ever hold fast the blessed hope of everlasting life, which thou hast given us in our Saviour Jesus Christ. Amen."""
"advent3" = """O Lord Jesu Christ, who at thy first coming didst send thy messenger to prepare thy way before thee: Grant that the ministers and stewards of thy mysteries may likewise so prepare and make ready thy way, by turning the hearts of the disobedient to the wisdom of the just, that at thy second coming to judge the world we may be found an acceptable people in thy sight, who livest and reignest with the Father and the Holy Spirit, ever one God, world without end. Amen."""
"advent4" = """O Lord , raise up (we pray thee) thy power, and come among us, and with great might succour us; that whereas, through our sins and wickedness, we are sore let and hindered in running the race that is set before us, thy bountiful grace and mercy may speedily help and deliver us; through the satisfaction of thy Son our Lord, to whom with thee and the Holy Ghost be honour and glory, world without end. Amen."""
"feast:12-26" = """Grant , O Lord, that in all our sufferings here upon earth, for the testimony of thy truth, we may stedfastly look up to heaven, and by faith behold the glory that shall be revealed; and, being filled with the Holy Ghost, may learn to love and bless our persecutors by the example of thy first Martyr Saint Stephen, who prayed for his murderers to thee, O blessed Jesus, who standest at the right hand of God to succour all those that suffer for thee, our only Mediator and Advocate. Amen."""
"feast:12-25" = """Almighty God, who hast given us thy only-begotten Son to take our nature upon him, and as at this time to be born of a pure Virgin: Grant that we being regenerate, and made thy children by adoption and grace, may daily be renewed by thy Holy Spirit; through the same our Lord Jesus Christ, who liveth and reigneth with thee and the same Spirit, ever one God, world without end. Amen."""
"christmas1" = """Almighty God, who hast given us thy only-begotten Son to take our nature upon him, and as at this time to be born of a pure Virgin: Grant that we being regenerate, and made thy children by adoption and grace, may daily be renewed by thy Holy Spirit; through the same our Lord Jesus Christ, who liveth and reigneth with thee and the same Spirit, ever one God, world without end. Amen."""
"feast:1-1" = """Almighty God, who madest thy blessed Son to be circumcised, and obedient to the law for man; Grant us the true circumcision of the Spirit; that, our hearts, and all our members, being mortified from all worldly and carnal lusts, we may in all things obey thy blessed will; through the same thy Son Jesus Christ our Lord. Amen."""
"feast:1-6" = """O God , who by the leading of a star didst manifest thy only-begotten Son to the Gentiles: Mercifully grant, that we, which know thee now by faith, may after this life have the fruition of thy glorious Godhead; through Jesus Christ our Lord. Amen."""
"epiphany1" = """O Lord , we beseech thee mercifully to receive the prayers of thy people which call upon thee; and grant that they may both perceive and know what things they ought to do, and also may have grace and power faithfully to fulfil the same; through Jesus Christ our Lord. Amen."""
"epiphany2" = """Almighty and everlasting God, who dost govern all things in heaven and earth: Mercifully hear the supplications of thy people, and grant us thy peace all the days of our life; through Jesus Christ our Lord. Amen."""
"epiphany3" = """Almighty and everlasting God, mercifully look upon our infirmities, and in all our dangers and necessities stretch forth thy right hand to help and defend us; through Jesus Christ our Lord. Amen."""
"epiphany4" = """O God , who knowest us to be set in the midst of so many and great dangers, that by reason of the frailty of our nature we cannot always stand upright: Grant to us such strength and protection, as may support us in all dangers, and carry us through all temptations; through Jesus Christ our Lord. Amen."""
"epiphany5" = """O Lord , we beseech thee to keep thy Church and household continually in thy true religion; that they who do lean only upon the hope of thy heavenly grace may evermore be defended by thy mighty power; through Jesus Christ our Lord. Amen."""
"epiphany6" = """O God , whose blessed Son was manifested that he might destroy the works of the devil, and make us the sons of God, and heirs of eternal life: Grant us, we beseech thee, that, having this hope, we may purify ourselves, even as he is pure; that, when he shall appear again with power and great glory, we may be made like unto him in his eternal and glorious kingdom; where with thee, O Father, and thee, O Holy Ghost, he liveth and reigneth, ever one God, world without end. Amen."""
"septuagesima" = """O Lord , we beseech thee favourably to hear the prayers of thy people; that we, who are justly punished for our offences, may be mercifully delivered by thy goodness, for the glory of thy Name; through Jesus Christ our Saviour, who liveth and reigneth with thee and the Holy Ghost, ever one God, world without end. Amen."""
"sexagesima" = """O Lord God, who seest that we put not our trust in any thing that we do: Mercifully grant that by thy power we may be defended against all adversity; through Jesus Christ our Lord. Amen."""
"quinquagesima" = """O Lord , who hast taught us that all our doings without charity are nothing worth: Send thy Holy Ghost, and pour into our hearts that most excellent gift of charity, the very bond of peace and of all virtues, without which whosoever liveth is counted dead before thee. Grant this for thine only Son Jesus Christ's sake. Amen."""
"feast:12-27" = """Merciful Lord, we beseech thee to cast thy bright beams of light upon thy Church, that it being enlightened by the doctrine of thy blessed Apostle and Evangelist Saint John may so walk in the light of thy truth, that it may at length attain to the light of everlasting life; through Jesus Christ our Lord. Amen."""
"lent1" = """O Lord , who for our sake didst fast forty days and forty nights: Give us grace to use such abstinence, that, our flesh being subdued to the Spirit, we may ever obey thy godly motions in righteousness and true holiness, to thy honour and glory, who livest and reignest with the Father and the Holy Ghost, one God, world without end. Amen."""
"lent2" = """Almighty God, who seest that we have no power of ourselves to help ourselves: Keep us both outwardly in our bodies, and inwardly in our souls; that we may be defended from all adversities which may happen to the body, and from all evil thoughts which may assault and hurt the soul; through Jesus Christ our Lord. Amen."""
"lent3" = """We beseech thee, Almighty God, look upon the hearty desires of thy humble servants, and stretch forth the right hand of thy Majesty, to be our defence against all our enemies; through Jesus Christ our Lord. Amen."""
"lent4" = """Grant , we beseech thee, Almighty God, that we, who for our evil deeds do worthily deserve to be punished, by the comfort of thy grace may mercifully be relieved; through our Lord and Saviour Jesus Christ. Amen."""
"lent5" = """We beseech thee, Almighty God, mercifully to look upon thy people; that by thy great goodness they may be governed and preserved evermore, both in body and soul; through Jesus Christ our Lord. Amen."""
"palm_sunday" = """Almighty and everlasting God, who, of thy tender love towards mankind, hast sent thy Son, our Saviour Jesus Christ, to take upon him our flesh, and to suffer death upon the cross, that all mankind should follow the example of his great humility: Mercifully grant, that we may both follow the example of his patience, and also be made partakers of his resurrection; through the same Jesus Christ our Lord. Amen."""
"good_friday" = """Almighty God, we beseech thee graciously to behold this thy family, for which our Lord Jesus Christ was contented to be betrayed, and given up into the hands of wicked men, and to suffer death upon the cross, who now liveth and reigneth with thee and the Holy Ghost, ever one God, world without end. Amen."""
"easter_even" = """Grant , O Lord, that as we are baptized into the death of thy blessed Son our Saviour Jesus Christ, so by continual mortifying our corrupt affections we may be buried with him; and that, through the grave, and gate of death, we may pass to our joyful resurrection; for his merits, who died, and was buried, and rose again for us, thy Son Jesus Christ our Lord. Amen."""
"easter" = """Almighty God, who through thine only-begotten Son Jesus Christ hast overcome death, and opened unto us the gate of everlasting life: We humbly beseech thee, that as by thy special grace preventing us thou dost put into our minds good desires, so by thy continual help we may bring the same to good effect; through Jesus Christ our Lord, who liveth and reigneth with thee and the Holy Ghost, ever one God, world without end. Amen."""
"easter1" = """Almighty Father, who hast given thine only Son to die for our sins, and to rise again for our justification: Grant us so to put away the leaven of malice and wickedness, that we may alway serve thee in pureness of living and truth; through the merits of the same thy Son Jesus Christ our Lord. Amen."""
"easter2" = """Almighty God, who hast given thine only Son to be unto us both a sacrifice for sin, and also an ensample of godly life: Give us grace that we may always most thankfully receive that his inestimable benefit, and also daily endeavour ourselves to follow the blessed steps of his most holy life; through the same Jesus Christ our Lord. Amen."""
"easter3" = """Almighty God, who shewest to them that be in error the light of thy truth, to the intent that they may return into the way of righteousness: Grant unto all them that are admitted into the fellowship of Christ's religion, that they may eschew those things that are contrary to their profession, and follow all such things as are agreeable to the same; through our Lord Jesus Christ. Amen."""
"easter4" = """O Almighty God, who alone canst order the unruly wills and affections of sinful men; Grant unto thy people, that they may love the thing which thou commandest, and desire that which thou dost promise; that so, among the sundry and manifold changes of the world, our hearts may surely there be fixed, where true joys are to be found; through Jesus Christ our Lord. Amen."""
"easter5" = """O Lord , from whom all good things do come: Grant to us thy humble servants, that by thy holy inspiration we may think those things that be good, and by thy merciful guiding may perform the same; through our Lord Jesus Christ. Amen."""
"ascension" = """Grant , we beseech thee, Almighty God, that like as we do believe thy only-begotten Son our Lord Jesus Christ to have ascended into the heavens; so we may also in heart and mind thither ascend, and with him continually dwell, who liveth and reigneth with thee and the Holy Ghost, one God, world without end. Amen."""
"ascension1" = """O God the King of glory, who hast exalted thine only Son Jesus Christ with great triumph unto thy kingdom in heaven: We beseech thee, leave us not comfortless; but send to us thine Holy Ghost to comfort us, and exalt us unto the same place whither our Saviour Christ is gone before, who liveth and reigneth with thee and the Holy Ghost, one God, world without end. Amen."""
"whitsun" = """God , who as at this time didst teach the hearts of thy faithful people, by the sending to them the light of thy Holy Spirit; Grant us by the same Spirit to have a right judgement in all things, and evermore to rejoice in his holy comfort; through the merits of Christ Jesus our Saviour, who liveth and reigneth with thee, in the unity of the same Spirit, one God, world without end. Amen."""
"trinity1" = """O God , the strength of all them that put their trust in thee, mercifully accept our prayers; and because through the weakness of our mortal nature we can do no good thing without thee, grant us the help of thy grace, that in keeping of thy commandments we may please thee, both in will and deed; through Jesus Christ our Lord. Amen."""
"trinity" = """Almighty and everlasting God, who hast given unto us thy servants grace, by the confession of a true faith to acknowledge the glory of the eternal Trinity, and in the power of the Divine Majesty to worship the Unity: We beseech thee, that thou wouldest keep us stedfast in this faith, and evermore defend us from all adversities, who livest and reignest, one God, world without end. Amen."""
"trinity2" = """O Lord , who never failest to help and govern them who thou dost bring up in thy stedfast fear and love: Keep us, we beseech thee, under the protection of thy good providence, and make us to have a perpetual fear and love of thy holy Name; through Jesus Christ our Lord. Amen."""
"trinity3" = """O Lord , we beseech thee mercifully to hear us; and grant that we, to whom thou hast given an hearty desire to pray, may by thy mighty aid be defended and comforted in all dangers and adversities; through Jesus Christ our Lord. Amen."""
"trinity4" = """O God , the protector of all that trust in thee, without whom nothing is strong, nothing is holy: Increase and multiply upon us thy mercy; that, thou being our ruler and guide, we may so pass through things temporal, that we finally lose not the things eternal: Grant this, O heavenly Father, for Jesus Christ's sake our Lord. Amen."""
"trinity5" = """Grant , O Lord, we beseech thee, that the course of this world may be so peaceably ordered by thy governance, that thy Church may joyfully serve thee in all godly quietness; through Jesus Christ our Lord. Amen."""
"trinity6" = """O God , who hast prepared for them that love thee such good things as pass man's understanding: Pour into our hearts such love toward thee, that we, loving thee above all things, may obtain thy promises, which exceed all that we can desire; through Jesus Christ our Lord. Amen."""
"trinity7" = """Lord of all power and might, who art the author and giver of all good things: Graft in our hearts the love of thy name, increase in us true religion, nourish us with all goodness, and of thy great mercy keep us in the same; through Jesus Christ our Lord. Amen."""
"trinity8" = """O God , whose never-failing providence ordereth all things both in heaven and earth; We humbly beseech thee to put away from us all hurtful things, and to give us those things which be profitable for us; through Jesus Christ our Lord. Amen."""
"trinity9" = """Grant to us, Lord, we beseech thee, the spirit to think and do always such things as be rightful; that we, who cannot do any thing that is good without thee, may by thee be enabled to live according to thy will; through Jesus Christ our Lord. Amen."""
"trinity10" = """Let thy merciful ears, O Lord, be open to the prayers of thy humble servants; and that they may obtain their petitions make them to ask such things as shall please thee; through Jesus Christ our Lord. Amen."""
"trinity11" = """O God , who declarest thy almighty power most chiefly in shewing mercy and pity: Mercifully grant unto us such a measure of thy grace, that we, running the way of thy commandments, may obtain thy gracious promises, and be made partakers of thy heavenly treasure; through Jesus Christ our Lord. Amen."""
"trinity12" = """Almighty and everlasting God, who art always more ready to hear than we to pray, and art wont to give more than either we desire or deserve: Pour down upon us the abundance of thy mercy; forgiving us those things whereof our conscience is afraid, and giving us those good things which we are not worthy to ask, but through the merits and mediation of Jesus Christ, thy Son, our Lord. Amen."""
"trinity13" = """Almighty and merciful God, of whose only gift it cometh that thy faithful people do unto thee true and laudable service: Grant, we beseech thee, that we may so faithfully serve thee in this life, that we fail not finally to attain thy heavenly promises; through the merits of Jesus Christ our Lord. Amen."""
"trinity14" = """Almighty and everlasting God, give unto us the increase of faith, hope, and charity; and, that we may obtain that which thou dost promise, make us to love that which thou dost command; through Jesus Christ our Lord. Amen."""
"trinity15" = """Keep , we beseech thee, O Lord, thy Church with thy perpetual mercy; and, because the frailty of man without thee cannot but fall, keep us ever by thy help from all things hurtful, and lead us to all things profitable to our salvation; through Jesus Christ our Lord. Amen."""
"trinity16" = """O Lord , we beseech thee, let thy continual pity cleanse and defend thy Church; and, because it cannot continue in safety without thy succour, preserve it evermore by thy help and goodness; through Jesus Christ our Lord. Amen."""
"trinity17" = """Lord , we pray thee that thy grace may always prevent and follow us, and make us continually to be given to all good works; through Jesus Christ our Lord. Amen."""
"trinity18" = """Lord , we beseech thee, grant thy people grace to withstand the temptations of the world, the flesh, and the devil, and with pure hearts and minds to follow thee the only God; through Jesus Christ our Lord. Amen."""
"trinity19" = """O God , forasmuch as without thee we are not able to please thee; Mercifully grant, that thy Holy Spirit may in all things direct and rule our hearts; through Jesus Christ our Lord. Amen."""
"trinity20" = """O Almighty and most merciful God, of thy bountiful goodness keep us, we beseech thee, from all things that may hurt us; that we, being ready both in body and soul, may cheerfully accomplish those things that thou wouldest have done; through Jesus Christ our Lord. Amen."""
"trinity21" = """Grant , we beseech thee, merciful Lord, to thy faithful people pardon and peace; that they may be cleansed from all their sins, and serve thee with a quiet mind; through Jesus Christ our Lord. Amen."""
"trinity22" = """Lord , we beseech thee to keep thy household the Church in continual godliness; that through thy protection it may be free from all adversities, and devoutly given to serve thee in good works, to the glory of thy name; through Jesus Christ our Lord. Amen."""
"trinity23" = """O God , our refuge and strength, who art the author of all godliness: Be ready, we beseech thee, to hear the devout prayers of thy Church; and grant that those things which we ask faithfully we may obtain effectually; through Jesus Christ our Lord. Amen."""
"trinity24" = """O Lord , we beseech thee, absolve thy people from their offences; that through thy bountiful goodness we may all be delivered from the bands of those sins, which by our frailty we have committed: Grant this, O heavenly Father, for Jesus Christ's sake, our blessed Lord and Saviour. Amen."""
"trinity25" = """Stir up, we beseech thee, O Lord, the wills of thy faithful people; that they, plenteously bringing forth the fruit of good works, may of thee be plenteously rewarded; through Jesus Christ our Lord. Amen."""
"feast:11-30" = """Almighty God, who didst give such grace unto thy holy Apostle Saint Andrew, that he readily obeyed the calling of thy Son Jesus Christ, and followed him without delay: Grant unto us all, that we, being called by thy holy word, may forthwith give up ourselves obediently to fulfil thy holy commandments; through the same Jesus Christ our Lord. Amen."""
"feast:12-21" = """Almighty and everliving God, who for the more confirmation of the faith didst suffer thy holy Apostle Thomas to be doubtful in thy Son's resurrection: Grant us so perfectly, and without all doubt, to believe in thy Son Jesus Christ, that our faith in thy sight may never be reproved. Hear us, O Lord, through the same Jesus Christ, to whom, with thee and the Holy Ghost, be all honour and glory, now and for evermore. Amen."""
"feast:1-25" = """O God , who, through the preaching of the blessed Apostle Saint Paul, hast caused the light of the Gospel to shine throughout the world: Grant, we beseech thee, that we, having his wonderful conversion in remembrance, may shew forth our thankfulness unto thee for the same, by following the holy doctrine which he taught; through Jesus Christ our Lord. Amen."""
"feast:2-2" = """Almighty and everliving God, we humbly beseech thy Majesty, that, as thy only-begotten Son was this day presented in the temple in substance of our flesh, so we may be presented unto thee with pure and clean hearts, by the same thy Son Jesus Christ our Lord. Amen."""
"feast:2-24" = """O Almighty God, who into the place of the traitor Judas didst choose thy faithful servant Matthias to be of the number of the twelve Apostles: Grant that thy Church, being alway preserved from false Apostles, may be ordered and guided by faithful and true pastors; through Jesus Christ our Lord. Amen."""
"feast:3-25" = """We beseech thee, O Lord, pour thy grace into our hearts; that, as we have known the incarnation of thy Son Jesus Christ by the message of an angel, so by his cross and passion we may be brought unto the glory of his resurrection; through the same Jesus Christ our Lord. Amen."""
"feast:4-25" = """O Almighty God, who hast instructed thy holy Church with the heavenly doctrine of thy Evangelist Saint Mark: Give us grace, that, being not like children carried away with every blast of vain doctrine, we may be established in the truth of thy holy Gospel; through Jesus Christ our Lord. Amen."""
"feast:5-1" = """O Almighty God, whom truly to know is everlasting life: Grant us perfectly to know thy Son Jesus Christ to be the way, the truth, and the life; that, following the steps of thy holy Apostles, Saint Philip and Saint James, we may stedfastly walk in the way that leadeth to eternal life; through the same thy Son Jesus Christ our Lord. Amen."""
"feast:6-11" = """O Lord God Almighty, who didst endue thy holy Apostle Barnabas with singular gifts of the Holy Ghost: Leave us not, we beseech thee, destitute of thy manifold gifts, nor yet of grace to use them alway to thy honour and glory; through Jesus Christ our Lord. Amen."""
"feast:6-24" = """Almighty God, by whose providence thy servant John Baptist was wonderfully born, and sent to prepare the way of thy Son our Saviour, by preaching of repentance: Make us so to follow his doctrine and holy life, that we may truly repent according to his preaching; and after his example constantly speak the truth, boldly rebuke vice, and patiently suffer for the truth's sake; through Jesus Christ our Lord. Amen."""
"feast:6-29" = """O Almighty God, who by thy Son Jesus Christ didst give to thy Apostle Saint Peter many excellent gifts, and commandedst him earnestly to feed thy flock: Make, we beseech thee, all Bishops and Pastors diligently to preach thy holy Word, and the people obediently to follow the same, that they may receive the crown of everlasting glory; through Jesus Christ our Lord. Amen."""
"feast:7-25" = """Grant , O merciful God, that as thine holy Apostle Saint James, leaving his father and all that he had, without delay was obedient unto the calling of thy Son Jesus Christ, and followed him; so we, forsaking all worldly and carnal affections, may be evermore ready to follow thy holy commandments; through Jesus Christ our Lord. Amen."""
"feast:8-24" = """O Almighty and everlasting God, who didst give to thine Apostle Bartholomew grace truly to believe and to preach thy Word: Grant, we beseech thee, unto thy Church, to love that Word which he believed, and both to preach and receive the same; through Jesus Christ our Lord. Amen."""
"feast:9-21" = """O Almighty God, who by thy blessed Son didst call Matthew from the receipt of custom to be an Apostle and Evangelist: Grant us grace to forsake all covetous desires and inordinate love of riches, and to follow the same thy Son Jesus Christ, who liveth and reigneth with thee and the Holy Ghost, one God, world without end. Amen."""
"feast:9-29" = """O everlasting God, who hast ordained and constituted the services of Angels and men in a wonderful order: Mercifully grant that, as thy holy Angels alway do thee service in heaven, so by thy appointment they may succour and defend us on earth; through Jesus Christ our Lord. Amen."""
"feast:10-18" = """Almighty God, who calledst Luke the Physician, whose praise is in the Gospel, to be an Evangelist, and Physician of the soul: May it please thee that, by the wholesome medicines of the doctrine delivered by him, all the diseases of our souls may be healed; through the merits of thy Son Jesus Christ our Lord. Amen."""
"feast:10-28" = """O Almighty God, who hast built thy Church upon the foundation of the Apostles and Prophets, Jesus Christ himself being the head corner-stone: Grant us so to be joined together in unity of spirit by their doctrine, that we may be made an holy temple acceptable unto thee; through Jesus Christ our Lord. Amen."""
"feast:11-1" = """O Almighty God, who hast knit together thine elect in one communion and fellowship, in the mystical body of thy Son Christ our Lord: Grant us grace so to follow thy blessed Saints in all virtuous and godly living, that we may come to those unspeakable joys, which thou hast prepared for them that unfeignedly love thee; through Jesus Christ our Lord. Amen."""
"feast:12-28" = """O Almighty God, who out of the mouths of babes and sucklings hast ordained strength, and madest infants to glorify thee by their deaths: Mortify and kill all vices in us, and so strengthen us by thy grace, that by the innocency of our lives, and constancy of our faith, even unto death, we may glorify thy holy Name; through Jesus Christ our Lord. Amen."""
"ash_wednesday" = """Almighty and everlasting God, who hatest nothing that thou hast made, and dost forgive the sins of all them that are penitent: Create and make in us new and contrite hearts, that we worthily lamenting our sins, and acknowledging our wretchedness, may obtain of thee, the God of all mercy, perfect remission and forgiveness; through Jesus Christ our Lord. Amen."""

[orthodox]
kind = "The Troparion"
source = "Hapgood, Service Book of the Holy Orthodox-Catholic Apostolic Church, 1906"

# The Octoechos cycles eight tones through the Sundays after
# Pentecost, so the resurrectional Troparion of the week is fixed
# by the tone, not by the Sunday: tone = ((N - 1) mod 8) or 8.
# Hapgood states the rule (p. xxvi): the Second Sunday takes the
# First Tone, and "on the tenth Sunday after Pentecost, the First
# Tone is used again."
[orthodox.aliases]
"pentecost2" = "tone1"
"pentecost3" = "tone2"
"pentecost4" = "tone3"
"pentecost5" = "tone4"
"pentecost6" = "tone5"
"pentecost7" = "tone6"
"pentecost8" = "tone7"
"pentecost9" = "tone8"
"pentecost10" = "tone1"
"pentecost11" = "tone2"
"pentecost12" = "tone3"
"pentecost13" = "tone4"
"pentecost14" = "tone5"
"pentecost15" = "tone6"
"pentecost16" = "tone7"
"pentecost17" = "tone8"
"pentecost18" = "tone1"
"pentecost19" = "tone2"
"pentecost20" = "tone3"
"pentecost21" = "tone4"
"pentecost22" = "tone5"
"pentecost23" = "tone6"
"pentecost24" = "tone7"
"pentecost25" = "tone8"
"pentecost26" = "tone1"
"pentecost27" = "tone2"
"pentecost28" = "tone3"
"pentecost29" = "tone4"
"pentecost30" = "tone5"
"pentecost31" = "tone6"
"pentecost32" = "tone7"
"pentecost33" = "tone8"
"pentecost34" = "tone1"
"pentecost35" = "tone2"
"pentecost36" = "tone3"
"pentecost37" = "tone4"

[orthodox.texts]
"tone1" = """While the stone was sealed by the Jews, and soldiers stood on guard over thy body undefiled, thou didst rise on the third day, O Saviour, who givest life unto the world. For which cause the Heavenly Powers cried aloud unto thee, O Giver of Life: Glory to thy resurrection, O Christ! Glory to thy kingdom! Glory to thy providence, O thou who alone lovest mankind!"""
"tone2" = """When thou didst condescend unto death, O Life Immortal, thou didst slay Hell with the lightning flash of thy divinity. When also thou didst raise up the dead from the subterranean abodes, all the Powers of heaven cried aloud: O Life-giver, Christ our God, glory to thee!"""
"tone3" = """Let the heavens rejoice and let the earth be glad, for the Lord hath showed strength with his arm; he hath trampled down Death by death; he is become the first-born of the dead; from the womb of Hell hath he delivered us, and unto the world hath he vouchsafed great mercy."""
"tone4" = """When the Women Disciples of the Lord had learned from the Angels the glad tidings of the Resurrection, and had cast away the condemnation of their forefathers, they spake exultingly to the Apostles: Death is no more; Christ-God is risen, granting unto the world great mercy."""
"tone5" = """The Word, who with the Father and the Spirit hath no beginning, and who, for our salvation, was born of a Virgin, let us faithful believers hymn and adore. For it was his good pleasure to ascend the cross in the flesh, and to suffer death, and through his own glorious Resurrection to raise the dead."""
"tone6" = """The Angelic Powers were in thy sepulchre, and the guards became as dead men, and Mary stood by the tomb seeking thy most pure body. Thou didst despoil Hell, yet wert not tempted thereby; thou who art the bestower of life didst come to meet the Woman. Glory to thee, O Lord, who didst rise again from the dead."""
"tone7" = """By thy cross thou didst destroy death; thou didst open paradise to the Thief; thou didst change the funeral wail of the Myrrh-bearing Women, and didst command them to announce unto thine Apostles that thou wert risen from the dead, O Christ our God, who bestowest on the world great mercy."""
"tone8" = """Thou didst descend from on high, O Tender-hearted One; thou didst endure the three-days' burial, that thou mightest free us from our passions, O our Life and Resurrection. Glory, O Lord, to thee."""

# The feasts have proper hymns rather than the week's tone. These are
# sliced from the same volume's "Special Services", each anchored to the
# opening words printed under the feast's own label — a canon's troparia
# read just as plausibly, and the Paschal chapter labels one that is not
# the Paschal Troparion at all.
"ascension" = """Thou art ascended up into glory, O Christ our God, having made joyful thy disciples by the promise of thy Holy Spirit, the blessing which was announced unto them. For thou art the Son of God, the Redeemer of the world."""
"feast:1-6" = """When in Jordan thou wast baptized, O Lord, the worship of the Trinity was made manifest For the voice of the Father bare witness unto thee, calling thee his beloved Son, and the Spirit, in the form of a Dove, confirmed the steadfastness of that word: O Christ our God, who didst manifest thyself, and dost enlighten the world, glory to thee."""
"feast:11-21" = """To-day is the foreshadowing of the beneficence of God which is to come, and the heralding of man's salvation. The Virgin is clearly manifested in the temple of God, and in anticipation announceth Christ unto all men. Unto her let us, also, cry aloud: Hail, thou who art the fulfilment of the Creator's providence."""
"feast:12-25" = """Thy Nativity, O Christ our God, hath arisen upon the world as the light of wisdom. For at it, they who worshipped the stars were, by a Star, taught to adore thee, the Sun of Righteousness, and to know thee, the Orient from on high. O Lord, glory to thee."""
"feast:2-2" = """Hail, O Virgin Birth-giver of God: for from thee hath shone forth the Sun of Righteousness, Christ our God, who giveth light to those who are in darkness. And rejoice, thou aged, righteous man, that didst receive in thine arms the Redeemer of our souls, who giveth unto us resurrection."""
"feast:3-25" = """To-day is the crown of our salvation, and the manifestation of that mystery which is from ever-lasting: The Son of God becometh the son of a Virgin, and Gabriel announceth the glad tidings of grace. Wherefore let us also cry aloud with him unto the Birth-giver of God: Hail, thou that art full of grace, the Lord is with thee!"""
"feast:8-15" = """In Birth-giving thou didst preserve thy virginity; in thy Falling-asleep thou hast not forsaken the world, O Birth-giver of God. Thou hast passed over into life, thou who art the Mother of Life, and through thine intercessions dost deliver our souls from death."""
"feast:8-6" = """Thou wast transfigured upon the Mount, O Christ-God, revealing unto thy disciples thy glory in so far as they were able to bear it. Let thy light everlasting illumine us sinners also; through the prayers of the Birth-giver of God. O Light-giver, glory to thee!"""
"feast:9-14" = """O Lord, save thy people, and bless thine inheritance, granting victory over enemies unto our Sovereign, N., and through thy Cross preserving thine Estate."""
"great_friday" = """Thou hast ransomed us from the curse of the law by thy precious blood; when thou wast nailed to the Cross and pierced with a spear, thou didst pour forth immortality for men, O our Saviour: glory to thee."""
"palm_sunday" = """Thou didst raise Lazarus from the dead, O Christ our God, making certain the universal resurrection, before thy Passion. For which cause we also, like unto the children, bearing the emblems of victory, cry aloud unto thee, the Conqueror of Death: Hosanna in the highest! Blessed is he that cometh in the Name of the Lord."""
"pascha" = """Christ is risen from the dead, trampling down Death by death, and upon those in the tomb bestowing life."""
"pentecost" = """Blessed art thou, O Christ our God, who hast revealed fishers most wise, sending down upon them the Holy Spirit, and thereby catching the universe as in a net. O Christ our God, who lovest mankind, glory to thee."""

[roman]
kind = "The Collect"
source = "The Roman Missal for the Use of the Laity, 1861"

[roman.texts]
"advent1" = """Exert, we beseech thee, O Lord, thy power, and come: that by thy protection we may be freed from the imminent dangers of our sins, and be saved by thy mercy."""
"advent2" = """Stir up, O Lord, our hearts to prepare the ways of thy only begotten Son: that by his coming we may be enabled to serve thee with pure minds."""
"advent3" = """Bend thine ear, O Lord, we beseech thee, to our prayers, and enlighten the darkness of our minds by the grace of thy visitation."""
"advent4" = """Exert, we beseech thee, O Lord, thy power, and come: and succour us by thy great might: that by the assistance of thy grace, thy indulgent mercy may hasten, what is delayed by our sins."""
"corpus_christi" = """O God, who in this wonderful sacrament, has left us a perpetual memorial of thy Passion; grant us, we beseech thee, so to reverence the sacred mysteries of thy body and blood, that in our souls we may always be sensible of the fruit of the redemption thou hast purchased for us."""
"easter" = """O God, who, on this day, by thy only begotten Son's victory over death, didst open for us a passage to eternity; grant that our prayers, which thy preventing grace inspireth, may by thy help become effectual."""
"easter2" = """O God, who, by the humiliation of thy Son, hast raised up the fallen world: grant to thy people perpetual joy: that they whom thou hast delivered from the danger of everlasting death, may arrive at eternal happiness."""
"easter3" = """O God, who shewest the light of thy truth to such as go astray, that they may return to the way of righteousness: grant that all, who profess the Christian name, may forsake whatever is contrary to that profession, and closely pursue what is agreeable to it."""
"easter4" = """O God, who makest the faithful to be of one mind: grant that thy people may love what thou commandest, and desire what thou promisest: that, amidst the uncertainties of this world, we may place our affections where there are true joys."""
"easter5" = """O God, from whom all that is good proceeds: grant that thy people, by thy inspiration, may resolve on what is right, and by thy direction, put it in practice."""
"epiphany1" = """According to thy divine mercy, O Lord, receive the vows of thy people, who pour forth their prayers to thee; that they may know what their duty requireth of them, and be able to comply with what they know."""
"feast:1-1" = """O God, who by the fruitful virginity of the blessed Mary, hast given mankind the rewards of eternal salvation: grant, we beseech thee, that we may experience her intercession, through whom we deserved to receive the Author of Life, our Lord Jesus Christ thy Son."""
"feast:1-6" = """O God, who by the direction of a star didst this day manifest thy only Son to the Gentiles; mercifully grant that we, who now know thee by faith, may come at length to see the glory of thy Majesty."""
"feast:11-1" = """Almighty and eternal God, by whose favour we honour on one solemnity the merits of all thy saints: grant we may obtain a plentiful blessing of thy so much desired mercy, since we have so many petitioners in our behalf."""
"feast:12-25" = """Grant, we beseech thee, O Almighty God, that we who groan under the old captivity of sin, may be freed therefrom by the birth of thy only begotten Son."""
"feast:12-26" = """Grant, O Lord, we beseech thee, that we may imitate him whose memory we celebrate, so as to learn to love even our enemies, because we now solemnize his martyrdom, who knew how to pray, even for his persecutors, to our Lord Jesus Christ, thy Son."""
"feast:6-24" = """O God, who hast honoured this day by the birth of blessed John the Baptist: grant that thy people may rejoice in spirit, and guide them in the way of eternal salvation."""
"feast:7-25" = """Sanctify, O Lord, and preserve thy people; that being assisted by James, thy Apostle, they may please thee in their conduct of life, and always serve thee with a steadfast faith."""
"feast:8-6" = """O God, who by the testimony of the prophets, didst confirm the mysteries of our faith in the glorious transfiguration of thy Son, and by a voice from heaven shewedst us that we are thy adopted children: mercifully grant that we may be heirs to the King of Glory, and partakers of his bliss."""
"feast:9-29" = """O God, who, by a wonderful order, hast regulated the employments of angels and men: grant that those who are always ministering before thee in heaven, may defend our lives here on earth."""
"lent1" = """O God, who purifiest thy Church by the yearly observation of Lent: grant, that what thy children endeavour to obtain of thee by abstinence, they may put in execution by good works."""
"lent2" = """O God, who seest how destitute we are of all strength, preserve us both within and without, that our bodies may be free from all adversity, and our souls purified from all evil thoughts."""
"lent4" = """Grant, we beseech thee, O Almighty God, that we, who are justly afflicted according to our demerits, may be relieved by thy comforting grace."""
"low_sunday" = """Grant, we beseech thee, O Almighty God, that we, who have celebrated the solemnity of Easter, may, by the assistance of thy divine grace, ever make the effects thereof manifest in our lives and actions."""
"passion_sunday" = """Mercifully look down on thy people, we beseech thee, O Almighty God, that, by thy bounty and protection, they may be governed and guarded both in body and soul."""
"pentecost" = """O God, who, by the light of the Holy Ghost, didst this day instruct the hearts of the faithful: grant, by the direction of the same Holy Spirit, that we may relish what is right, and always enjoy his consolation."""
"pentecost10" = """O God, who chiefly manifestest thy Almighty power in pardoning and shewing mercy, increase thy goodness towards us: that having recourse to thy promises, we may be partakers of thy heavenly blessing."""
"pentecost11" = """O Almighty and eternal God, who, in the abundance of thy goodness, exceedest both the merits and requests of thy suppliants; pour forth thy mercy upon us: and both pardon what our consciences dreadeth, and grant such blessings as we dare not presume to ask."""
"pentecost12" = """O Almighty and merciful God, from whose gift it proceedeth that thy people worthily serve thee; grant we beseech thee, that we may run on, without stumbling, to the obtaining the effects of thy promises."""
"pentecost13" = """O Almighty and eternal God, grant us an increase of faith, hope, and charity; and, that we may deserve what thou promisest, make us love what thou commandest."""
"pentecost16" = """May thy grace, O Lord, always prevent and follow us; and make us constantly zealous in the practice of good works."""
"pentecost17" = """Grant, we beseech thee, O Lord, that thy people may avoid all contagion of the devil: and with a clean heart follow thee, the only true God."""
"pentecost18" = """May the influence of thy mercy, O Lord, direct our souls: for without thy help we can do nothing well pleasing to thee."""
"pentecost20" = """Favourably grant, we beseech thee, O Lord, thy servants both pardon and peace; that, being cleansed from the guilt of all their offences, they may serve thee with secure minds."""
"pentecost22" = """O God, our refuge and strength, fountain of all goodness, mercifully give ear to the fervent prayers of thy church, and grant, that what we ask with faith, we may effectually obtain."""
"pentecost4" = """Grant, we beseech thee, O Lord, that the world, with regard to us, may be governed in peace by thy providence, and thy Church pay her devotions to thee in tranquillity."""
"pentecost5" = """O God, who hast prepared invisible good things for those that love thee: pour forth into our hearts an affectionate love for thee: that loving thee in all things, and above all things, we may come to the enjoyment of thy promises, which are above whatever we can desire."""
"pentecost7" = """O God, whose providence is never deceived in what it appointeth: we humbly beseech thee to remove whatever may be prejudicial to us: and grant us whatever may be to the advantage of our souls."""
"pentecost8" = """Grant us, O Lord, we beseech thee, the spirit of thinking and doing what is right, that we, who cannot even subsist without thee, may live according to thee."""
"quinquagesima" = """Mercifully hear our prayers, we beseech thee, O Lord, and being freed from the chains of our sins, preserve us from all adversity."""
"septuagesima" = """Mercifully hear, we beseech thee, O Lord, the prayers of thy people: that we who are justly afflicted for our sins, may be mercifully delivered for the glory of thy name."""
"sexagesima" = """O God, who seest that we place no confidence in any thing we do: mercifully grant that, by the protection of the Doctor of the Gentiles, we may be defended against all adversity."""
"trinity" = """O almighty and everlasting God who has granted thy servants, in the confession of the true faith to acknowledge the glory of an Eternal Trinity, and in the power of majesty, to adore an Unity: we beseech thee that, by the strength of this faith, we may be defended from all adversity."""
