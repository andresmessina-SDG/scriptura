<!--
  Open-book glyph anchoring the "Voices of the Church" hero row. Bundled
  and drawn fill-only (two solid page halves with a centre gutter) so GTK4
  recolors it to @accent_color reliably — the platform's dictionary
  symbolic is a legacy multi-colour icon that ignores recolouring.
-->
