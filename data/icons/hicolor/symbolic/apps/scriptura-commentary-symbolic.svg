    <path d="M8.6 4.1 C10.4 3.0 12.8 3.0 14.3 3.5 C14.5 3.57 14.6 3.75 14.6 3.95 L14.6 12.1 C14.6 12.4 14.3 12.62 14.0 12.53 C12.6 12.12 10.5 12.2 9.0 13.05 C8.82 13.15 8.6 13.02 8.6 12.8 Z"/>
  </g>
</svg>
