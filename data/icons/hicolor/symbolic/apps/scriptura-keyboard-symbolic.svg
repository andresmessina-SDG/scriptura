<?xml version="1.0" encoding="UTF-8"?>
<!--
  Keyboard glyph for the "Keyboard Shortcuts" button. Bundled (not pulled
  from the icon theme) because some themes ship a keyboard symbolic that
  GTK4 fails to recolor, rendering blank on dark backgrounds. Drawn in the
  same fill-only structure as the app symbolic so it recolors reliably: a
  thin rounded body frame (even-odd ring) plus filled keys and a spacebar.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <g fill="#222">
    <path fill-rule="evenodd" d="M2 3 H14 A1 1 0 0 1 15 4 V12 A1 1 0 0 1 14 13 H2 A1 1 0 0 1 1 12 V4 A1 1 0 0 1 2 3 Z M2.2 4 A0.8 0.8 0 0 0 2 4.8 V11.2 A0.8 0.8 0 0 0 2.2 12 H13.8 A0.8 0.8 0 0 0 14 11.2 V4.8 A0.8 0.8 0 0 0 13.8 4 Z"/>
    <rect x="3" y="5.2" width="1.5" height="1.5" rx="0.3"/>
    <rect x="5.25" y="5.2" width="1.5" height="1.5" rx="0.3"/>
    <rect x="7.5" y="5.2" width="1.5" height="1.5" rx="0.3"/>
    <rect x="9.75" y="5.2" width="1.5" height="1.5" rx="0.3"/>
    <rect x="11.5" y="5.2" width="1.5" height="1.5" rx="0.3"/>
    <rect x="3" y="7.45" width="1.5" height="1.5" rx="0.3"/>
    <rect x="5.25" y="7.45" width="1.5" height="1.5" rx="0.3"/>
    <rect x="7.5" y="7.45" width="1.5" height="1.5" rx="0.3"/>
    <rect x="9.75" y="7.45" width="1.5" height="1.5" rx="0.3"/>
    <rect x="11.5" y="7.45" width="1.5" height="1.5" rx="0.3"/>
    <rect x="4.5" y="9.7" width="7" height="1.4" rx="0.4"/>
  </g>
</svg>
