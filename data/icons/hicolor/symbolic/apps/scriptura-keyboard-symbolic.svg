<?xml version="1.0" encoding="UTF-8"?>
<!--
  Keyboard glyph for the "Keyboard Shortcuts" button. Bundled (not pulled
  from the icon theme) because some themes ship a keyboard symbolic that
  GTK4 fails to recolor, rendering blank on dark backgrounds. Drawn in the
  same fill-only structure as the app symbolic so it recolors reliably: a
  rounded body frame (even-odd ring) plus one row of keys and a spacebar.

  Weight pass 2026-07-17: frame 1.0 → 1.6 toward the GNOME 2px symbolic
  norm. The heavier frame leaves less inner room, so the second key row was
  dropped (five keys + spacebar is the standard GNOME keyboard metaphor)
  rather than shrinking the keys into noise.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <g fill="#222">
    <path fill-rule="evenodd" d="M2.2 3 H13.8 A1.2 1.2 0 0 1 15 4.2 V11.8 A1.2 1.2 0 0 1 13.8 13 H2.2 A1.2 1.2 0 0 1 1 11.8 V4.2 A1.2 1.2 0 0 1 2.2 3 Z M3.1 4.5 A0.6 0.6 0 0 0 2.5 5.1 V10.9 A0.6 0.6 0 0 0 3.1 11.5 H12.9 A0.6 0.6 0 0 0 13.5 10.9 V5.1 A0.6 0.6 0 0 0 12.9 4.5 Z"/>
    <rect x="3.6" y="5.6" width="1.4" height="1.4" rx="0.3"/>
    <rect x="5.7" y="5.6" width="1.4" height="1.4" rx="0.3"/>
    <rect x="7.8" y="5.6" width="1.4" height="1.4" rx="0.3"/>
    <rect x="9.9" y="5.6" width="1.4" height="1.4" rx="0.3"/>
    <rect x="11.6" y="5.6" width="1.4" height="1.4" rx="0.3"/>
    <rect x="4.9" y="8.6" width="6.2" height="1.5" rx="0.4"/>
  </g>
</svg>
