<?xml version="1.0" encoding="UTF-8"?>
<!--
  Lightbulb glyph for the menu footer's "Tips & Gestures" button. Bundled
  (not pulled from the icon theme) for two reasons: Adwaita ships no
  lightbulb symbolic, and the info/help symbolics that do exist collide
  visually with the About button's glyph. Drawn in the same fill-only
  structure as the keyboard / theme-system symbolics — a filled bulb body
  plus a two-tier screw base — so GTK4 recolors it reliably on any
  background (a hardcoded-fill device icon renders blank on dark/accent).
-->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <g fill="#222">
    <path d="M8 1.4 C5.1 1.4 3.25 3.5 3.25 5.9 C3.25 7.6 4.2 8.75 5 9.55 C5.45 10 5.7 10.45 5.8 11 L10.2 11 C10.3 10.45 10.55 10 11 9.55 C11.8 8.75 12.75 7.6 12.75 5.9 C12.75 3.5 10.9 1.4 8 1.4 Z"/>
    <rect x="5.85" y="11.5" width="4.3" height="1.3" rx="0.45"/>
    <rect x="6.55" y="13.1" width="2.9" height="1.5" rx="0.5"/>
  </g>
</svg>
