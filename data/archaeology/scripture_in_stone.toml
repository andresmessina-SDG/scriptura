caption = "A clay tablet from the Babylonian Chronicles, the year-by-year record of Babylon's kings. One entry notes how Nebuchadnezzar besieged 'the city of Judah,' captured it, seized its king, and appointed another — the fall of Jerusalem in 597 BC and the exile of Jehoiachin, set down in plain Babylonian prose beside the account in Second Kings."
refs = [ { book = "2 Kings", chapter = 24, verse = 10 } ]

