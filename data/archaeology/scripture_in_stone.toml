[[reading]]
title = "James B. Pritchard, ed. — Ancient Near Eastern Texts Relating to the Old Testament (ANET)"
note = "The standard sourcebook: the inscriptions gathered here, in scholarly translation."

[[reading]]
title = "Lawrence J. Mykytiuk — Identifying Biblical Persons in Northwest Semitic Inscriptions"
note = "The careful catalogue behind the lists of biblical figures named in the epigraphic record."

[[reading]]
title = "Amihai Mazar — Archaeology of the Land of the Bible"
note = "A standard survey of the archaeology of ancient Israel and its neighbours."

[[reading]]
title = "Eric H. Cline — Biblical Archaeology: A Very Short Introduction"
note = "A brief, even-handed entry point to the field and its methods."

[[reading]]
title = "K. A. Kitchen — On the Reliability of the Old Testament"
note = "A wide-ranging scholarly case for the Old Testament's standing as history."

[[reading]]
title = "Israel Finkelstein & Neil Asher Silberman — The Bible Unearthed"
note = "The influential minimalist challenge, which redates much of the tradition — worth knowing and weighing against the evidence above."

[[reading]]
