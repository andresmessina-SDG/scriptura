# Scripture in Stone — a curated, bundled archaeology module for Scriptura.
# A short illustrated "book": artifacts in biblical/chronological sequence,
# each mapped to the verse(s) it touches. Read as a document; clicking a verse
# opens that passage in the Bible pane.
#
# EDITORIAL RULES (keep captions to this standard):
#  - Measured and scholarly. Describe what the object *is* and what it *attests*
#    ("names Pontius Pilate as prefect of Judea"), never "proves the Bible".
#  - No forgeries or high-doubt objects. Where reputable scholars genuinely
#    disagree, state the doubt plainly in the caption (see Mesha, Shebna, Caiaphas).
#  - `credit` carries photographer + licence (the images are CC-BY-SA/CC0/PD
#    photos of public-domain ancient objects).

[intro]
title = "Scripture in Stone"
subtitle = "The Bible and the archaeological record"
body = """
Scripture was written in a real world of kings, empires, and cities — and that world left traces in the ground. This gallery gathers artifacts that touch the people, places, and events named in the Bible: a victory stele that mentions the house of David, an Assyrian monument that pictures a king of Israel, a Persian cylinder, a stone bearing Pilate's name.

A note on method. The aim here is evidence, not argument. Each entry describes what the object is and what it attests, and stops there; an inscription can confirm that a king reigned or a governor held office without settling everything the Bible says about him. Objects of doubtful authenticity are left out, and where serious scholars disagree, the disagreement is named. Read in this spirit, these stones are not proofs but witnesses — fragments of the historical ground on which the text stands.
"""

# ── Chapters (era spine; rendered in this order) ─────────────────────────────
[[chapter]]
id = "before-israel"
title = "Before the Kingdom"
intro = "Before there was an Israel for the records to name, its neighbours were already writing — and a few of their words reach across to touch its earliest story."

[[chapter]]
id = "united-monarchy"
title = "The United Monarchy"
intro = "From the centuries the Bible assigns to Saul, David, and Solomon: the first inscriptions, and the first monumental stones of a kingdom."

[[chapter]]
id = "divided"
title = "The Kingdom Divided"
intro = "One kingdom had become two, Israel and Judah, as the great powers to the east began to write their names into the record."

[[chapter]]
id = "judah"
title = "Judah, Assyria, and Nineveh"
intro = "Judah alone now, in the lengthening shadow of Assyria — a clash of empires and a single besieged city, set down from both sides."

[[chapter]]
id = "exile"
title = "The Fall and the Exile"
intro = "Babylon's rise and Jerusalem's fall, and the long captivity by the rivers of a foreign land."

[[chapter]]
id = "return"
title = "Return under Persia"
intro = "Under the kings of Persia, the road home — and the royal policy that let a scattered people return to rebuild."

[[chapter]]
id = "between"
title = "Between the Testaments"
intro = "The centuries between the Testaments, which were not silent at all: Greek kings, the Maccabees, and the scrolls of a waiting people."

[[chapter]]
id = "jesus"
title = "The World of Jesus"
intro = "The Judea of the Gospels brought down to its stones — a governor's name, a high priest's bones, the pools and pavements of the city."

[[chapter]]
id = "apostolic"
title = "The Apostolic World"
intro = "Out from Jerusalem into the wider world: the cities, courts, and crowds the apostles met across the Roman East."

[[chapter]]
id = "ad70"
title = "The Fall of Jerusalem"
intro = "The great revolt and its end — and the monuments Rome itself raised over the destruction of Jerusalem in AD 70."

[[chapter]]
id = "everyday"
title = "Everyday Life"
intro = "Beneath the kings and the empires lay the ordinary world the Bible takes for granted — its homes and lamps, its presses and weights, its household gods."

