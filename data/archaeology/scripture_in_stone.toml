place = "Dibon, Moab"
date = "c. 840 BC"
holding = "Louvre, Paris"
credit = "photo Mbzt · CC BY-SA 4.0"
caption = "A black basalt victory stele set up by Mesha, king of Moab, recounting his rebellion against Israel. It names 'Omri king of Israel' and his dynasty, and the God of Israel by the name YHWH; by a contested reading it may also name the 'House of David.' Second Kings tells the same revolt of Mesha from Israel's side."
refs = [ { book = "2 Kings", chapter = 3, verse = 4 } ]

[[entry]]
chapter = "divided"
image = "kurkh.jpg"
provenance = "Found at Üçtepe, 1861"
lat = 37.91
lon = 40.74
source = "https://commons.wikimedia.org/wiki/File:Kurkh_stele_of_Shalmaneser_III._From_Diyarbak%C4%B1r%2C_southern_Turkey._British_Museum.jpg"
