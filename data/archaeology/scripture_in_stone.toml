place = "Karnak, Egypt"
date = "c. 925 BC"
holding = "in situ"
credit = "photo Neithsabes · CC BY-SA 3.0"
caption = "On the temple wall at Karnak, the pharaoh Sheshonq I left a relief of his campaign into Canaan, with a long list of the towns his army claimed. Sheshonq is widely identified with the biblical Shishak, who, the Bible says, marched against Jerusalem in the fifth year of Rehoboam and carried off the treasures of the Temple."
refs = [ { book = "1 Kings", chapter = 14, verse = 25 } ]

[[entry]]
chapter = "divided"
image = "mesha.jpg"
provenance = "Found at Dhiban, 1868 (broken up before recovery)"
related = [ "tel_dan.jpg" ]
lat = 31.51
lon = 35.78
source = "https://commons.wikimedia.org/wiki/File:F4171_Louvre_stele_de_Mesha_AO5066_rwk.jpg"
