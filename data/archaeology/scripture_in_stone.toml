# ── Glossary (closing reference section) ─────────────────────────────────────
[[term]]
term = "Tell (tel)"
definition = "A mound built up over centuries as a town was rebuilt on its own ruins, layer upon layer — the characteristic site of Near Eastern archaeology."

[[term]]
term = "Stratum"
definition = "A single layer of occupation within a tell. Reading the layers in order — stratigraphy — is how a site and the objects in it are dated."

[[term]]
term = "In situ"
definition = "Found in its original place, in a documented archaeological context — as opposed to an object that surfaced on the antiquities market."

[[term]]
term = "Provenance"
definition = "The recorded history of where an object was found and how it reached its present home. A secure provenance is what separates evidence from a possible forgery."

[[term]]
term = "Stele"
definition = "An upright stone slab carved with an inscription or relief and set up as a monument, often to mark a victory or a boundary."

[[term]]
term = "Relief"
definition = "A carving raised from a flat background, as on the palace walls and monuments of Assyria and Egypt."

[[term]]
term = "Cuneiform"
definition = "Wedge-shaped script pressed into wet clay with a reed stylus, used across Mesopotamia for Akkadian, Sumerian, and other languages."

[[term]]
term = "Ostracon"
definition = "A potsherd reused as a cheap writing surface for notes, receipts, and letters — the everyday paper of the ancient world."

[[term]]
term = "Bulla"
definition = "A lump of clay pressed over the cord of a rolled document and stamped with a seal, preserving the owner's name in miniature."

[[term]]
term = "Epigraphy"
definition = "The study of ancient inscriptions — their script, language, and dating."

[[term]]
term = "Eponym"
definition = "An Assyrian official after whom a year was named. The surviving eponym lists give Assyrian chronology — and the dates it anchors — their backbone."

[[term]]
term = "Ossuary"
definition = "A stone box for the reburied bones of the dead, common in and around Jerusalem in the first century AD."

[[term]]
term = "Ashlar"
definition = "A large building stone squared and finely dressed on its faces, as in the Herodian masonry of the Temple platform."

[[term]]
term = "Bema"
definition = "A raised platform from which a Roman magistrate gave public judgment, as at Corinth."

[[term]]
term = "Squeeze"
definition = "A paper impression pressed onto an inscription to record its text. The Mesha Stele is partly known from a squeeze taken before the stone was broken."

