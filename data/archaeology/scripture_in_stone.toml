caption = "A palace relief of the Assyrian king Sargon II riding to war. Sargon completed the conquest of Samaria and deported the northern kingdom; his reign was so briefly named in the Bible, yet so absent from other records, that his existence was once doubted — until his vast palace at Khorsabad was unearthed. Isaiah names him directly."
refs = [ { book = "Isaiah", chapter = 20, verse = 1 } ]

[[entry]]
