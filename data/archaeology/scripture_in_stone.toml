refs = [ { book = "Daniel", chapter = 4, verse = 30 } ]

[[entry]]
chapter = "exile"
image = "nabonidus.jpg"
provenance = "Excavated at Ur"
related = [ "babylonian_chronicle.jpg", "ishtar_gate.jpg", "cyrus_cylinder.jpg" ]
lat = 30.96
