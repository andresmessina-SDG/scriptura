# Byzantine / Orthodox icons — the 'byzantine_icon' tradition (gold-ground
# panels). A curated set of canonical scene-icons, each a specific pre-modern
# Public-Domain work on Wikimedia Commons (2-D painted panels: faithful
# reproductions of works whose authors died >100 yrs ago are PD), hand-mapped
# to the verse the scene depicts and visually verified. The Gospel Great Feasts
# form a coherent core; a few Old-Testament icons anchor it. `n` keys are
# "IC##" so dest filenames never collide with other sources. source_url is the
# Commons File: page (built from `file` by the builder).

