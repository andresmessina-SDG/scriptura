# Illuminated-manuscript miniatures — the 'illumination' tradition (kind shares
# 'illustration', so no bridge query change). A curated set of medieval
# picture-Bible scenes, each a specific Wikimedia Commons scan hand-mapped to
# the verse it depicts and visually verified (built manuscripts-only to /tmp,
# each image eyeballed against its scene). `n` keys are "MS##" so dest
# filenames never collide with other sources; source_url is built from `file`.
#
# Two manuscripts carry the set: the 13th-c. Morgan Crusader Bible (Old
# Testament narrative — its strength is the battle and royal cycle of Joshua
# through Kings) and the 15th-c. Très Riches Heures du Duc de Berry (a complete
# Infancy-to-Pentecost New Testament cycle in full-page miniatures). Three
# Genesis scenes come from the Saint Louis Psalters (Paris and Leiden).
#
# LICENSING: every plate is a faithful 2-D scan of a pre-1900 work, so all are
# Public Domain (same PD-Art basis as the icon and oil panels). The per-plate
# `attribution` names the manuscript, its date, and the holding library; that
# string is the card's only date line (no separate `year`), to avoid showing a
# bare "1416" above the attribution.
#
# Verses are chosen to overlap existing traditions where possible (e.g. the
# Crucifixion at John 19:18 sits beside the oil and the stained glass; the
# Ascension at Acts 1:9 beside the Le Mans window; David & Goliath at
# 1 Samuel 17:49 beside the engravings) so the "other traditions" expander
# lights up with the manuscript alongside them.

