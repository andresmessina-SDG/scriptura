# Hurlbut's "Bible Atlas" (1882) — antique sepia maps, public domain, fetched
# from Project Gutenberg eBook #41140 (images i-NNN-big.jpg). Each map is keyed
# to the passage range(s) it covers; a map spanning several books gets several
# ranges (one imagery row per range, same image), so it surfaces on every book
# it depicts. img = the Gutenberg image stem.
#
# Seed: the regional + journey maps with clean narrative coverage. City/temple
# plans (Jerusalem, Athens, Corinth, Ephesus, Rome, Herod's Temple) and the
# comparative-size charts are skippable extensions, added later.

