# Plate -> scene + scripture reference for Julius Schnorr von Carolsfeld's
# "Die Bibel in Bildern" (1860). The Wikimedia Commons files are named
# "Schnorr von Carolsfeld Bibel in Bildern 1860 NNN.png", numbered 1-235
# (the full series; confirmed contiguous via the Commons category API).
#
# Each plate is keyed independently to its scene's verse range, so plate
# *order* is irrelevant to the app — only each plate's own (book, chapter,
# verse[, verse_end][, chapter_end]) matters. Scene titles come from the
# Commons gallery (in order) + the per-file categories; references are the
# well-known passage for each scene. The `book` is the scene's TRUE canonical
# book (the gallery's section headings group loosely — e.g. its "Exodus" run
# actually spans Exodus through Deuteronomy; corrected here).
#
# Confidence: canonical scenes are high-confidence; some verse anchors are the
# representative verse/short range for the moment depicted. Fields:
#   n, title, book, chapter, verse, [verse_end] (same chapter),
#   [chapter_end] (for cross-chapter ranges), [passage_label].
#
# DEUTEROCANON (plates 138, 144-159): mapped with apocrypha book names. These
# only surface when an apocrypha Bible (e.g. KJVA) is loaded (self-gating). If
# a name doesn't match the loaded module's exact book string the plate simply
# won't appear — verify against the module when wiring an apocrypha pack.

