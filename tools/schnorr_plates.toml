# Plate -> scene + scripture reference for Julius Schnorr von Carolsfeld's
# "Die Bibel in Bildern" (1860). The Wikimedia Commons files are named
# "Schnorr von Carolsfeld Bibel in Bildern 1860 NNN.png", numbered in Bible
# order, and each plate carries a chapter:verse reference in the original
# edition — so this table is a transcription, not a guess.
#
# Fields per plate:
#   n            = Commons plate number (NNN)
#   title        = display title
#   book         = canonical Scriptura book name
#   chapter, verse = anchor location
#   verse_end      = optional; last verse of the scene's range (same chapter)
#   chapter_end    = optional; last chapter, for cross-chapter ranges
#   passage_label  = optional human scope string
#
# SEED STATUS: the Genesis opening sequence (plates 1-15) is filled in and
# verified against the Commons gallery order + the per-file references. The
# remaining plates (to ~240, through the New Testament) are still to be
# transcribed — append [[plate]] entries in Commons number order. Run e.g.
#   python tools/build_imagery_pack.py /tmp/imagery --source schnorr --limit 5
# to fetch + catalog the first few.

