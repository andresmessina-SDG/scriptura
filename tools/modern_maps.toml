# Modern vector (SVG) Bible maps — crisp, clean, for the modern-app aesthetic.
# Seeded with Roberto Reggi's Pauline journey set on Wikimedia Commons, which
# he released into the public domain — a cohesive, single-cartographer modern
# set covering the New Testament journeys (the same Acts ranges the antique
# Hurlbut maps cover, so a journey can be seen in both styles). SVGs render
# crisply via the gdk-pixbuf rsvg loader. tradition = 'modern_map' so the Where
# tab leads with the modern map.
#
# `file` = exact Commons filename; `slug` = local basename. Extend with more
# subjects (OT empires, the Exodus, tribal allotment) as cleanly-licensed
# modern SVGs are verified — record each one's license + attribution.

[[map]]
file = "Paul the Apostle, first missionary journey.svg"
slug = "paul-journey-1"
title = "Paul's First Missionary Journey"
passage_label = "Acts 13–14"
license = "PD"
attribution = "Roberto Reggi, Wikimedia Commons (public domain)"
[[map.ranges]]
book = "Acts"
chapter = 13
verse = 1
chapter_end = 14
verse_end = 28

