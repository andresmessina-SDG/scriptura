# Modern vector (SVG) Bible maps — crisp, clean, for the modern-app aesthetic.
# Subjects we don't yet generate in-house. The New-Testament journeys are now
# our own computed maps (gen_maps.py → the `genmaps` source), so Roberto
# Reggi's Pauline-journey SVGs were dropped — redundant and stylistically off
# next to the house cartography. This file now carries only OT/empire subjects
# (CC-licensed, various cartographers) until generated equivalents exist.
# SVGs render crisply via the gdk-pixbuf rsvg loader; tradition = 'modern_map'.
#
# `file` = exact Commons filename; `slug` = local basename.

# ── Old Testament subjects ──────────────────────────────────────────────────
# No public-domain modern SVGs exist for these; the good cartography is all
# Creative Commons. That's fine in an aggregated pack (mere aggregation, not an
# adaptation, so share-alike doesn't propagate), but each one MUST show its
# attribution + license — so the license name is carried inside `attribution`,
# the string the Where tab renders. Ranges parallel the antique Hurlbut maps
# for the same passages, so each OT verse gets modern + antique side by side.

[[map]]
file = "12 Tribes of Israel Map.svg"
slug = "tribes-of-israel"
title = "The Twelve Tribes of Israel"
passage_label = "Joshua 13–21"
license = "CC BY-SA 3.0"
attribution = "Kordas et al. · CC BY-SA 3.0 · Wikimedia Commons"
[[map.ranges]]
book = "Joshua"
chapter = 13
verse = 1
chapter_end = 21
verse_end = 45

