# Medieval stained glass — the 'stained_glass' tradition (kind='glass'). A
# curated set of famous in-situ windows from the great Gothic cathedrals
# (Chartres, Sainte-Chapelle, Canterbury, Poitiers, Le Mans), each a specific
# Wikimedia Commons photograph hand-mapped to the verse its scene depicts and
# visually verified. `n` keys are "GL##" so dest filenames never collide with
# other sources. source_url is built from `file` by the builder.
#
# LICENSING NOTE (differs from icons): a photograph of a 3-D stained-glass
# window is its own copyrightable work, so unlike a flat icon panel these are
# NOT automatically PD. Many Commons glass photos are CC BY-SA by the
# photographer. License is therefore PER-PLATE, and for the CC ones the
# photographer credit + licence is baked into `attribution` (the Art card shows
# attribution but not the raw licence column — that string is the compliance
# surface). Windows themselves are all pre-1300, so where a faithful frontal
# photo was released PD we use that.

[[glass]]
n = "GL01"
file = "France Chartres JesseTree c1145 a.JPG"
title = "The Tree of Jesse"
book = "Isaiah"
chapter = 11
verse = 1
license = "PD"
attribution = "Chartres Cathedral, c. 1145"

