# Curated masterwork cycles — whole-book sets that close out books the pack
# barely covered (ROADMAP Phase I "completeness" pass, Option B). Unlike the
# per-artist TOMLs, every plate here carries its own kind/tradition/artist
# metadata, so one ingest (ingest_curated) serves all the cycles; future
# curated one-off additions (Option A gap-fill) land in this same file.
#
# LICENSING: every plate is a faithful 2-D reproduction of a pre-1900 work
# (PD-Art) — license is recorded per plate. `n` keys are unique across the
# file and become the dest filename (cur_<n>.<ext>).
#
# Cycles in this file:
#   DUR01–15  Dürer, "The Apocalypse" (1498) — 15 woodcuts covering most of
#             Revelation's narrative arc (previously: 1 chapter of coverage).
#             Scans: Rijksmuseum / Chester Beatty / Leiden UL / LACMA, chosen
#             as the highest-resolution Commons file per scene.
#   BLA01–21  Blake, "Illustrations of the Book of Job" (1826) — the complete
#             21-engraving cycle; passages follow the plates' own inscribed
#             texts. Commons set "Blake Job N.jpg" (10/11 are "A10"/"A11"),
#             each file's description confirms "Nth print from…".
#   RAF01–07  Raphael Cartoons (c. 1515–16) — the seven surviving tapestry
#             cartoons: two Gospel scenes and five Acts scenes (the canonical
#             Acts images; previously Acts art was Doré-only).

