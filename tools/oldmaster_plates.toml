# Old Master oils — the 'old_master' tradition (kind='painting'). A curated set
# of the supreme Bible-narrative paintings of Western art (Caravaggio, Rembrandt,
# Artemisia Gentileschi, Velázquez, Mantegna, Fra Angelico), each a specific
# Wikimedia Commons scan hand-mapped to the verse it depicts and visually
# verified. `n` keys are "OM##" so dest filenames never collide with other
# sources. source_url is built from `file` by the builder.
#
# LICENSING: all pre-1900 works, so a faithful frontal scan is Public Domain
# (PD-Art) — same basis as the icon panels (unlike the 3-D stained glass, whose
# photos carry the photographer's copyright). License is still per-plate in case
# a future addition is a CC0 museum upload. artist + year are populated (the
# Art card shows "Artist · year"); attribution carries the holding institution.

