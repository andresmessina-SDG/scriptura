# Flatpak manifest for Bible Reader.
#
# Build locally:
#   flatpak-builder --user --install --force-clean build-dir \
#       org.codeberg.andresmessina.BibleReader.yml
#   flatpak run org.codeberg.andresmessina.BibleReader
#
# Three build modules:
#   - libsword    : CrossWire's SWORD library + Python bindings, built
#                   from source (Flathub runtimes don't ship it).
#   - whoosh      : pure-Python full-text search, pip-installed
#                   offline from a vendored tarball.
#   - bible-reader: the app itself — Python sources installed under
#                   /app/share/bible-reader, with a wrapper script
#                   in /app/bin and desktop/icon/metainfo installed
#                   to the conventional /app/share paths.
#
# TODOs flagged with [TODO: …] need values plugged in before this
# manifest builds. Mostly SHA256 sums of upstream source archives,
# which you compute with `sha256sum <downloaded-tarball>`.
#
# Runtime: GNOME Platform 48 is a stable choice in 2026; if the
# Flathub builders default to a newer runtime by the time you
# submit, just bump the runtime-version + sdk pair.

app-id: org.codeberg.andresmessina.BibleReader
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
# Wrapper name matches the app-id so the desktop file's
# Exec=org.codeberg.andresmessina.BibleReader resolves cleanly.
command: org.codeberg.andresmessina.BibleReader

finish-args:
  # Display protocols
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  # Network access for module downloads (Module Manager + Open Databases
  # tab + eBible catalog/translation downloads). Without this the
  # first-run welcome flow can't fetch the essentials bundle.
  - --share=network
  # Persist SWORD's data directory across runs so installed modules
  # don't get wiped on Flatpak upgrade. Same pattern BibleTime uses.
  - --persist=.sword
  # The app talks to xdg-desktop-portal for file chooser dialogs
  # (Export Study Journal). No host-filesystem permissions needed —
  # the portal handles file access through user prompts.

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake
  - /share/man
  - /share/doc
  - /share/sword-utils
  - '*.la'
  - '*.a'

modules:
  # ── libcurl (libsword depends on it for InstallMgr network ops) ───────
  # The GNOME 49 runtime doesn't expose libcurl via the SDK's pkg-config
  # / library search path in a way SWORD's CMake picks up cleanly — the
  # build links libsword.so without curl symbols, then `buildtest`
  # fails at link time with `undefined reference to curl_easy_*`.
  # Building libcurl explicitly into /app/lib guarantees the symbols
  # are present and SWORD's find_package(CURL) resolves correctly.
  - name: libcurl
    buildsystem: autotools
    config-opts:
      - --disable-static
      - --with-openssl
      - --without-libpsl
      - --disable-docs
      - --disable-manual
    cleanup:
      - /bin
      - /share/man
      - /share/aclocal
    sources:
      - type: archive
        url: https://curl.se/download/curl-8.10.0.tar.gz
        sha256: 58c9dcf73493ae9d181fd334b3b3987ff73124621565187ade237bff1064a716

  # ── libsword (C++ only, no Python bindings) ───────────────────────────
  # We build libsword as a plain shared library here. SWORD's own
  # Python-bindings target has been a graveyard — it silently no-ops
  # in every combination we've tried (cmake/autotools, SWORD_BINDINGS
  # vs SWORD_PYTHON_3, with/without the setuptools-migration patch).
  # Instead the next module (python-libsword) pip-installs Greg
  # Hellings' standalone wrapper, which ships pre-generated SWIG
  # output and just links against the libsword.so we install here.
  #
  # Keep /lib/pkgconfig in the *build*; python-libsword's setup.py
  # uses `pkg-config --cflags --libs sword` to find us. The
  # top-level cleanup strips /lib/pkgconfig at the end, after all
  # modules have built.
  - name: libsword
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DLIBSWORD_LIBRARY_TYPE=Shared
      - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
      - -DSWORD_BUILD_TESTS=No
      - -DSWORD_BUILD_UTILS=No
      # Force -lcurl into every link line. SWORD's CMake locates
      # libcurl's headers via find_package(CURL) but doesn't
      # propagate the library to the link command on Flathub's
      # builder, so libsword.so ships without curl resolution.
      - -DCMAKE_SHARED_LINKER_FLAGS=-lcurl
      - -DCMAKE_EXE_LINKER_FLAGS=-lcurl
      - -DCMAKE_MODULE_LINKER_FLAGS=-lcurl
    cleanup:
      - /bin
      - /lib/libsword.la
      - /include
    sources:
      - type: archive
        url: https://crosswire.org/ftpmirror/pub/sword/source/v1.9/sword-1.9.0.tar.gz
        sha256: 42409cf3de2faf1108523e2c5ac0745d21f9ed2a5c78ed878ee9dcc303426b8a

  # ── python-libsword (the actual `import Sword` provider) ──────────────
  # Greg Hellings' standalone Python bindings for libsword. Lives at
  # https://github.com/greg-hellings/python-libsword. Version 1.9.0.post1
  # was cut against sword 1.9.0 (matches our libsword above).
  #
  # Why this and not SWORD's own bindings target:
  #   - It's a plain setup.py extension with `Sword.cxx` and `Sword.py`
  #     *already generated* and committed to the repo. No SWIG run at
  #     our build time, no Makefile.am macro chains, no silent skips.
  #   - setup.py just calls `pkg-config --cflags --libs sword` to
  #     locate our just-built libsword in /app/lib. As long as
  #     sword.pc is on PKG_CONFIG_PATH (Flatpak sets it to /app/lib/
  #     pkgconfig automatically at build time), the link resolves.
  #   - Installs to /app/lib/python3.X/site-packages/ via pip's
  #     --prefix mechanism, which is exactly where the runtime's
  #     python3 looks.
  #
  # --no-build-isolation: so pip uses the SDK's Python + setuptools
  # rather than spawning a hermetic venv that can't see /app.
  # --no-deps: Flathub builders run sandboxed with no network; the
  # package has no Python deps anyway.
  - name: python-libsword
    buildsystem: simple
    build-commands:
      - pip3 install --no-build-isolation --no-deps --prefix=${FLATPAK_DEST} .
    sources:
      - type: archive
        url: https://github.com/greg-hellings/python-libsword/archive/refs/tags/1.9.0.post1.tar.gz
        sha256: 37abd873b3418e4c30c5dac8c0d0609e3981480520d8304868b62be382a8958c

  # ── Whoosh (full-text search) ──────────────────────────────────────────
  # Pip-installed from a vendored tarball so Flathub builders don't
  # need network access at build time (the official Flathub builder
  # runs with --share=none for the build phase).
  - name: python3-whoosh
    buildsystem: simple
    build-commands:
      - pip3 install --verbose --exists-action=i --no-index --find-links="file://${PWD}"
                     --prefix=${FLATPAK_DEST} --no-build-isolation whoosh
    sources:
      # [TODO: pin a Whoosh version. 2.7.4 is the last stable from the
      # mamba-org/whoosh-reloaded fork; you can also use 3.0+ from the
      # active fork. Update URL + sha256 to match.]
      - type: file
        url: https://files.pythonhosted.org/packages/25/2b/6beed2107b148edc1321da0d489afc4617b9ed317ef7b72d4993cad9b684/Whoosh-2.7.4.tar.gz
        sha256: 7ca5633dbfa9e0e0fa400d3151a8a0c4bec53bd2ecedc0a67705b17565c31a83

  # ── The app itself ─────────────────────────────────────────────────────
  - name: bible-reader
    buildsystem: simple
    build-commands:
      # Wrapper script in /app/bin — named after the app-id so the
      # desktop file's Exec line and Flatpak's `command:` resolve to
      # the same path.
      - install -Dm755 flatpak/bible-reader.sh /app/bin/org.codeberg.andresmessina.BibleReader

      # All Python sources go to /app/share/bible-reader. The wrapper
      # script runs `python3 /app/share/bible-reader/main.py` and
      # Python adds that directory to sys.path so the local imports
      # (window.py, pane.py, paths.py, etc.) resolve.
      - mkdir -p /app/share/bible-reader
      - install -Dm644 main.py /app/share/bible-reader/main.py
      - install -Dm644 _version.py /app/share/bible-reader/_version.py
      - install -Dm644 paths.py /app/share/bible-reader/paths.py
      - install -Dm644 window.py /app/share/bible-reader/window.py
      - install -Dm644 pane.py /app/share/bible-reader/pane.py
      - install -Dm644 sword_bridge.py /app/share/bible-reader/sword_bridge.py
      - install -Dm644 ebible_bridge.py /app/share/bible-reader/ebible_bridge.py
      - install -Dm644 annotations.py /app/share/bible-reader/annotations.py
      - install -Dm644 bookmarks.py /app/share/bible-reader/bookmarks.py
      - install -Dm644 settings.py /app/share/bible-reader/settings.py
      - install -Dm644 reading_plans.py /app/share/bible-reader/reading_plans.py
      - install -Dm644 open_data.py /app/share/bible-reader/open_data.py
      - install -Dm644 search_panel.py /app/share/bible-reader/search_panel.py
      - install -Dm644 study_journal.py /app/share/bible-reader/study_journal.py
      - install -Dm644 crossref_panel.py /app/share/bible-reader/crossref_panel.py
      - install -Dm644 module_manager.py /app/share/bible-reader/module_manager.py
      - install -Dm644 annotation_dialogs.py /app/share/bible-reader/annotation_dialogs.py
      - install -Dm644 lexicon_panel.py /app/share/bible-reader/lexicon_panel.py
      - install -Dm644 devotional.py /app/share/bible-reader/devotional.py
      - install -Dm644 welcome.py /app/share/bible-reader/welcome.py

      # Desktop entry and icons. The metainfo install line is
      # deliberately commented out for now — flatpak-builder's
      # appstreamcli compose post-step is failing on this Zorin /
      # Ubuntu 24.04 builder for reasons that aren't reproducible
      # locally. Without the metainfo file in the build output,
      # compose has nothing to process and skips quietly, the
      # build completes, and we can validate the app actually
      # runs in Flatpak. Re-enable this install line once the
      # compose path is debugged — it's only needed for Flathub
      # submission, not for the app to function.
      - install -Dm644 data/org.codeberg.andresmessina.BibleReader.desktop
                       /app/share/applications/org.codeberg.andresmessina.BibleReader.desktop
      # - install -Dm644 data/org.codeberg.andresmessina.BibleReader.metainfo.xml
      #                  /app/share/metainfo/org.codeberg.andresmessina.BibleReader.metainfo.xml
      # Icons. The GNOME 48 runtime's GdkPixbuf doesn't always ship an
      # SVG loader, which makes Flatpak's icon validator emit
      # "Format not recognized" when we install the SVG directly.
      # Render the SVG to PNG at standard sizes during the build using
      # rsvg-convert (part of the SDK) — PNG is universally accepted
      # by every icon validator and pixbuf loader.
      - mkdir -p /app/share/icons/hicolor/256x256/apps
      - mkdir -p /app/share/icons/hicolor/128x128/apps
      - mkdir -p /app/share/icons/hicolor/64x64/apps
      - mkdir -p /app/share/icons/hicolor/48x48/apps
      - rsvg-convert -w 256 -h 256
                     data/icons/hicolor/scalable/apps/org.codeberg.andresmessina.BibleReader.svg
                     -o /app/share/icons/hicolor/256x256/apps/org.codeberg.andresmessina.BibleReader.png
      - rsvg-convert -w 128 -h 128
                     data/icons/hicolor/scalable/apps/org.codeberg.andresmessina.BibleReader.svg
                     -o /app/share/icons/hicolor/128x128/apps/org.codeberg.andresmessina.BibleReader.png
      - rsvg-convert -w 64 -h 64
                     data/icons/hicolor/scalable/apps/org.codeberg.andresmessina.BibleReader.svg
                     -o /app/share/icons/hicolor/64x64/apps/org.codeberg.andresmessina.BibleReader.png
      - rsvg-convert -w 48 -h 48
                     data/icons/hicolor/scalable/apps/org.codeberg.andresmessina.BibleReader.svg
                     -o /app/share/icons/hicolor/48x48/apps/org.codeberg.andresmessina.BibleReader.png
    sources:
      - type: dir
        path: .
